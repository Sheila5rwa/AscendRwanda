server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve index.html for any given route to support SPA navigation
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend
    # Use dynamic resolution to avoid caching Render's old IPs across deployments
    location /api/ {
        resolver 8.8.8.8 1.1.1.1 valid=30s;
        set $backend "https://ascend-rwanda-backend.onrender.com";
        # By combining $backend and $request_uri, we explicitly avoid proxy caching bugs
        proxy_pass $backend$request_uri;
        
        # REQUIRED for proxying to HTTPS upstreams with variables (SNI support)
        proxy_ssl_server_name on;
        proxy_ssl_name ascend-rwanda-backend.onrender.com;
        
        proxy_http_version 1.1;
        proxy_set_header Host ascend-rwanda-backend.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional optimizations to cache static assets
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}
